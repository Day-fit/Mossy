services:
  mossy:
    image: 'ghcr.io/day-fit/mossy-vault:latest'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6797/actuator/health"]
      retries: 3
      timeout: 5s
      interval: 10s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '6797:6797'
    environment:
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'DB_NAME=mossy_vault'
      - 'DB_USER=${DB_USER}'
      - 'DB_PASSWORD=${DB_PASSWORD}'
      - 'DB_URL=postgres:5432'
      - 'MOSSY_STOMP_HOST=https://mossy.dayfit.pl'
      - 'MOSSY_VAULT_ID=${MOSSY_VAULT_ID}'
      - 'MOSSY_VAULT_SECRET=${MOSSY_VAULT_SECRET}'
    profiles:
      - prod

  postgres:
    image: 'postgres:18.1-alpine'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d mossy_vault" ]
      retries: 5
      timeout: 5s
      interval: 10s
    environment:
      - 'POSTGRES_DB=mossy_vault'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USER}'
    volumes:
      - 'postgres:/var/lib/postgresql'
    ports:
      - '5433:5432'
volumes:
  postgres: