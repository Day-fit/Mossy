services:
  mossy-password:
    image: 'ghcr.io/day-fit/mossy-password:latest'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6797/actuator/health"]
      retries: 3
      timeout: 5s
      interval: 10s
    depends_on:
      - 'postgres'
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'DB_NAME=${DB_NAME}'
      - 'DB_NAME=${DB_NAME}'
      - 'DB_USER=${DB_USER}'
      - 'DB_PASSWORD=${DB_PASSWORD}'
      - 'MOSSY_STOMP_HOST=wss://mossy.dayfit.pl'
    profiles:
      - 'prod'
  mossy-device:
    image: 'ghcr.io/day-fit/mossy-password:latest'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6797/actuator/health" ]
      retries: 3
      timeout: 5s
      interval: 10s
    depends_on:
      - 'postgres'
    ports:
      - '8081:8081'
    environment:
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'DB_NAME=${DB_NAME}'
      - 'DB_USER=${DB_USER}'
      - 'DB_PASSWORD=${DB_PASSWORD}'
      - 'MOSSY_STOMP_HOST=wss://mossy.dayfit.pl'
    profiles:
      - 'prod'

  mossy-statistics:
    image: 'ghcr.io/day-fit/mossy-statistics:latest'
    depends_on:
      - 'postgres'
      - 'rabbitmq'
    ports:
      - '8085:8085'
    environment:
      - 'SPRING_PROFILES_ACTIVE=prod'
      - 'DB_NAME=${DB_NAME}'
      - 'DB_USER=${DB_USER}'
      - 'DB_PASSWORD=${DB_PASSWORD}'
      - 'RABBITMQ_HOST=${RABBITMQ_HOST}'
      - 'RABBITMQ_USER=${RABBITMQ_USER}'
      - 'RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}'
      - 'MOSSY_PASSWORD_BASE_URL=http://mossy-password:8080/api/v1'
    profiles:
      - 'prod'

  postgres:
    image: 'postgres:18.1-alpine'
    environment:
      - 'POSTGRES_DB=${DB_NAME}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USER}'
    volumes:
      - 'postgres:/var/lib/postgresql'
    ports:
      - '5432:5432'

  redis:
    image: 'redis:8.4.0-alpine3.22'
    environment:
      - 'REDIS_PASSWORD=${REDIS_PASSWORD}'
    ports:
      - '6379:6379'

  rabbitmq:
    image: 'rabbitmq:4.2.3-management-alpine'
    ports:
      - '15672:15672'
      - '5672:5672'
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq:/var/lib/rabbitmq
    profiles:
      - 'prod'

  rabbitmq-dev:
    image: 'rabbitmq:4.2.3-management-alpine'
    ports:
      - '15672:15672'
      - '5672:5672'
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions-dev.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq_dev:/var/lib/rabbitmq
    profiles:
      - 'dev'

  kafka:
    image: 'apache/kafka:4.2.0'
    ports:
      - '9092:29092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
volumes:
  postgres:
  rabbitmq:
  rabbitmq_dev: