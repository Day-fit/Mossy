spring.application.name=mossy-password
server.port=8082

server.servlet.context-path=/api/v1/

spring.jpa.hibernate.ddl-auto=update

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://${DB_URL}/${DB_NAME}

mossy.jwks.jwks-queue-name=jwks.queue.password
mossy.jwks.jwks-provider-uri=${JWKS_PROVIDER_URI}

mossy.security.allowed-origins=${ALLOWED_ORIGINS}
mossy.security.public-routes-patterns=/ws/vault-communication/**,/vault/statuses

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

mossy.statistics.exchange=direct.statistics.exchange
mossy.statistics.password-events-routing-key=statistics.password.event