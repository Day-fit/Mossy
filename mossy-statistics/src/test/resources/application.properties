spring.datasource.url=jdbc:h2:mem:statistics;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false
mossy.statistics.password-events-queue=statistics.queue.password-events
mossy.password.base-url=http://localhost:8082/api/v1
mossy.security.allowed-origins=http://localhost:5173
mossy.jwks.jwks-provider-uri=http://localhost:8083/api/v1/.well-known/jwks.json
mossy.jwks.jwks-queue-name=jwks.queue.statistics

mossy.kafka.topics.password-statistic.name=password.statistic
mossy.kafka.topics.password-statistic.partitions=3
mossy.kafka.topics.password-statistic.replicas=1