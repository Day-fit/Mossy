spring.application.name=mossy-statistics
server.port=8085
server.servlet.context-path=/api/v1/statistics

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://${DB_URL}/${DB_NAME}
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

mossy.statistics.password-events-queue=statistics.queue.password-events
mossy.password.base-url=${MOSSY_PASSWORD_BASE_URL:http://localhost:8082/api/v1}

mossy.security.allowed-origins=${ALLOWED_ORIGINS}
mossy.jwks.jwks-provider-uri=${JWKS_PROVIDER_URI}
mossy.jwks.jwks-queue-name=${JWKS_QUEUE_NAME:jwks.queue.statistics}
